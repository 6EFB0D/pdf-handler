# Supabase Edge Functions 設定
# 詳細: https://supabase.com/docs/guides/functions/function-configuration
#
# JWT検証を無効にする理由:
# - create-checkout-session / request-checkout: 匿名リクエスト・メール方式 Checkout
# - stripe-webhook: Stripeからのコールバック（JWTヘッダーなし）
# - verify-license / get-activations / deactivate-* / update-device-*: デスクトップアプリ（ライセンスキー等）
# - admin-* / ping: License Generator・ハートビート（x-admin-api-key 等・JWT なし）
#
# 注意: Supabase CLIの既知の不具合で、deno.jsonやconfig.tomlの
# verify_jwt設定が更新時に反映されない場合があります。その場合は
# ダッシュボードで手動でJWT検証をOFFにするか、--no-verify-jwtで
# デプロイしてください（docs/troubleshooting/checkout-debugging.md 参照）。

[functions.create-checkout-session]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.verify-license]
verify_jwt = false

# 以下: アプリ／Webhook／管理 GUI から JWT なしで呼ぶ関数（ゲートウェイ 401 防止）
[functions.request-checkout]
verify_jwt = false

[functions.get-activations]
verify_jwt = false

[functions.deactivate-device]
verify_jwt = false

[functions.update-device-display-name]
verify_jwt = false

[functions.ping]
verify_jwt = false

[functions.admin-generate-license]
verify_jwt = false

[functions.admin-list-licenses]
verify_jwt = false

[functions.admin-deactivate-license]
verify_jwt = false
