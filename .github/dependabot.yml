# QM 2.2 §3 G-4: 依存関係の自動更新 PR
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependency-updates-configuration-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # net8.0-windows プロジェクト。Microsoft は 10.x を .NET 10 向けに提供するため、
      # TFM を net10 に上げるまでメジャー更新 PR は抑制する（v1.1.4 P-deps-f）。
      - dependency-name: "Microsoft.Extensions.DependencyInjection"
        update-types: ["version-update:semver-major"]
      - dependency-name: "System.Drawing.Common"
        update-types: ["version-update:semver-major"]
