# Public repo (6EFB0D/pdf-handler) only — installed by scripts/publish-to-public-repo.ps1
# QM 2.2 §3.4: G-4 は DEV 正本。Public には gitleaks + track-downloads。
# Tier 1 (2026-06): weekly schedule, latest.json only (no daily history commits).
name: Download Statistics Tracker

on:
  schedule:
    # 毎週日曜 午前0時（JST）= UTC 土曜 15:00
    - cron: '0 15 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-downloads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch download statistics
        id: fetch-stats
        run: |
          echo "Fetching download statistics..."

          curl -s -H "Accept: application/vnd.github+json" \
               -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               "https://api.github.com/repos/${{ github.repository }}/releases" \
               > releases.json

          mkdir -p stats

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")

          echo "Downloads per release:"
          jq -r '.[] | "\(.tag_name): \([.assets[].download_count] | add // 0) downloads"' releases.json

          TOTAL_DOWNLOADS=$(jq '[.[] | [.assets[].download_count] | add // 0] | add' releases.json)
          echo "total_downloads=${TOTAL_DOWNLOADS}" >> $GITHUB_OUTPUT
          echo "Total downloads: ${TOTAL_DOWNLOADS}"

          jq --arg ts "$TIMESTAMP" --arg date "$DATE" --arg repo "${{ github.repository }}" '
            {
              timestamp: $ts,
              date: $date,
              repository: $repo,
              releases: [.[] | {
                tag_name: .tag_name,
                name: .name,
                published_at: .published_at,
                total_downloads: ([.assets[].download_count] | add // 0),
                assets: [.assets[] | {
                  name: .name,
                  size: .size,
                  download_count: .download_count,
                  created_at: .created_at
                }]
              }]
            }
          ' releases.json > stats/latest.json

          rm releases.json

      - name: Commit statistics
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add stats/latest.json

          if git diff --staged --quiet; then
            echo "No changes - skip commit"
          else
            git commit -m "Update download statistics - $(date -u +"%Y-%m-%d")"
            git push
            echo "Committed stats/latest.json"
          fi

      - name: Summary
        run: |
          echo "## Download statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "- **Total downloads**: ${{ steps.fetch-stats.outputs.total_downloads }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f stats/latest.json ]; then
            echo "### Per release" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.releases[] | "- **\(.tag_name)** (\(.name)): \(.total_downloads) downloads"' stats/latest.json >> $GITHUB_STEP_SUMMARY
          fi
