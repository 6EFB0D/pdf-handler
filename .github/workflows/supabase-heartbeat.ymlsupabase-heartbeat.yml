name: Supabase Heartbeat

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://yzmjuotvkxcfnsgleyxl.supabase.co/functions/v1/ping")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Supabase heartbeat successful"
          else
            echo "⚠️ Supabase may be paused"
            exit 1
          fi
