# Supabase プロジェクトのアクティビティ維持
# 7日間の一時停止を防ぐため、6日ごとに ping を送信
name: Supabase Heartbeat

on:
  schedule:
    # 毎日 0:00 UTC（日本時間 9:00）に実行
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://yzmjuotvkxcfnsgleyxl.supabase.co/functions/v1/ping")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Supabase heartbeat successful"
          else
            echo "⚠️ Supabase may be paused. Check dashboard: https://supabase.com/dashboard/project/yzmjuotvkxcfnsgleyxl"
            exit 1
          fi
