<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご購入ありがとうございます | Office Go Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f7f9f7;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
    }
    .logo { margin-bottom: 32px; }
    .logo img { width: 140px; }
    .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 16px;
    }
    .message {
      font-size: 15px;
      line-height: 1.8;
      color: #555;
      margin-bottom: 32px;
    }
    .message strong { color: #333; }
    .info-box {
      background: #f1f8f1;
      border: 1px solid #c8e6c9;
      border-radius: 8px;
      padding: 16px 20px;
      text-align: left;
      margin-bottom: 32px;
      font-size: 14px;
      line-height: 2;
      color: #444;
    }
    .info-box .label { color: #2e7d32; font-weight: bold; }
    .support {
      font-size: 13px;
      color: #888;
      line-height: 1.8;
    }
    .support a { color: #2e7d32; }
    .home-link {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: #2e7d32;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }
    .home-link:hover { background: #1b5e20; }
    hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="assets/logo/logo-a.jpg" alt="Office Go Plan">
    </div>

    <div class="icon">✅</div>
    <h1>ご購入ありがとうございます</h1>

    <p class="message">
      お支払いが完了しました。<br>
      <strong>ライセンスキーをご登録のメールアドレスへ送信しました。</strong><br>
      数分以内にメールをご確認ください。
    </p>

    <div class="info-box">
      <div><span class="label">📧 メールが届かない場合</span></div>
      <div>・迷惑メールフォルダをご確認ください</div>
      <div>・数分待ってもメールが届かない場合は、</div>
      <div>　サポートまでご連絡ください</div>
    </div>

    <div class="info-box">
      <div><span class="label">🔑 アクティベーション手順</span></div>
      <div>① アプリを起動する</div>
      <div>② メニュー →「ライセンス認証」を開く</div>
      <div>③ メール記載のライセンスキーを入力</div>
    </div>

    <hr>

    <div class="support">
      ご不明な点は下記サポートまでお問い合わせください<br>
      <a href="mailto:support@office-goplan.com">support@office-goplan.com</a>
    </div>

    <a href="https://6efb0d.github.io/office-goplan/" class="home-link">
      トップページへ戻る
    </a>
  </div>
</body>
</html>
